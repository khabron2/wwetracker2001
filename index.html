<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WWF 2001 — Attitude Era Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --text: #f0e6d3;
    --text-muted: #7a7065;
    --raw: #cc0000;
    --raw-glow: #ff000040;
    --smackdown: #0044cc;
    --smackdown-glow: #0044cc40;
    --ppv: #d4a017;
    --ppv-glow: #d4a01740;
    --check: #22c55e;
    --accent: #cc0000;
    --gold: #d4a017;
  }
  .light {
    --bg: #f5f0e8;
    --surface: #ffffff;
    --surface2: #ede8df;
    --border: #d4cfc5;
    --text: #1a1410;
    --text-muted: #8a8070;
    --raw: #cc0000;
    --smackdown: #0033bb;
    --ppv: #b8890f;
    --check: #16a34a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Barlow Condensed', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 3px solid var(--raw);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(204,0,0,0.3);
  }

  .header-inner {
    max-width: 900px;
    margin: 0 auto;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .logo-block {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .logo-wwf {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem;
    color: var(--raw);
    letter-spacing: 2px;
    line-height: 1;
    text-shadow: 3px 3px 0 #000, 0 0 20px var(--raw-glow);
  }

  .logo-year {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    color: var(--gold);
    letter-spacing: 3px;
  }

  .header-controls {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .btn-toggle-night {
    background: var(--surface2);
    border: 2px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    font-family: 'Oswald', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 2px;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .btn-toggle-night:hover { border-color: var(--gold); color: var(--gold); }

  /* STATS BAR */
  .stats-bar {
    max-width: 900px;
    margin: 0 auto;
    padding: 10px 16px;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }

  .stat-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Oswald', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 1px;
  }

  .stat-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .stat-dot.raw { background: var(--raw); }
  .stat-dot.smackdown { background: var(--smackdown); }
  .stat-dot.ppv { background: var(--ppv); }
  .stat-dot.all { background: var(--check); }

  /* FILTERS */
  .filters {
    max-width: 900px;
    margin: 0 auto;
    padding: 14px 16px 0;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 6px 16px;
    font-family: 'Oswald', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: 2px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }

  .filter-btn:hover { border-color: var(--text-muted); color: var(--text); }
  .filter-btn.active-all { border-color: var(--text); color: var(--text); background: var(--surface2); }
  .filter-btn.active-raw { border-color: var(--raw); color: var(--raw); background: rgba(204,0,0,0.1); }
  .filter-btn.active-smackdown { border-color: var(--smackdown); color: var(--smackdown); background: rgba(0,68,204,0.1); }
  .filter-btn.active-ppv { border-color: var(--ppv); color: var(--ppv); background: rgba(212,160,23,0.1); }
  .filter-btn.active-watched { border-color: var(--check); color: var(--check); background: rgba(34,197,94,0.1); }

  /* MAIN */
  .main {
    max-width: 900px;
    margin: 0 auto;
    padding: 16px;
  }

  /* MONTH GROUP */
  .month-group { margin-bottom: 32px; }

  .month-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 4px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .month-count {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem;
    color: var(--text-muted);
    font-weight: 400;
    letter-spacing: 1px;
  }

  /* EVENT CARD */
  .event-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 4px solid var(--border);
    margin-bottom: 8px;
    border-radius: 2px;
    overflow: hidden;
    transition: all 0.25s;
    cursor: pointer;
  }

  .event-card:hover { transform: translateX(3px); }
  .event-card.type-raw { border-left-color: var(--raw); }
  .event-card.type-smackdown { border-left-color: var(--smackdown); }
  .event-card.type-ppv { border-left-color: var(--ppv); }

  .event-card.watched {
    opacity: 0.55;
  }

  .event-card.watched .event-title {
    text-decoration: line-through;
    text-decoration-color: var(--check);
  }

  .event-main {
    display: flex;
    align-items: center;
    padding: 12px 14px;
    gap: 12px;
  }

  /* CHECKBOX */
  .check-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    font-size: 14px;
    color: transparent;
  }

  .event-card.type-raw .check-btn:hover { border-color: var(--raw); }
  .event-card.type-smackdown .check-btn:hover { border-color: var(--smackdown); }
  .event-card.type-ppv .check-btn:hover { border-color: var(--ppv); }

  .event-card.watched .check-btn {
    background: var(--check);
    border-color: var(--check);
    color: #fff;
  }

  /* TYPE BADGE */
  .type-badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 2px;
    padding: 2px 7px;
    border-radius: 1px;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .badge-raw { background: transparent; color: #fff; padding: 0; overflow: hidden; line-height: 0; }
  .badge-smackdown { background: transparent; color: #fff; padding: 0; overflow: hidden; line-height: 0; }
  .badge-ppv { background: var(--ppv); color: #000; font-weight: 700; padding: 2px 7px; }

  .badge-logo {
    display: block;
    width: 56px;
    height: 28px;
    object-fit: fill;
    border-radius: 2px;
  }

  .event-info { flex: 1; min-width: 0; }

  .event-title {
    font-family: 'Oswald', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 1px;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .event-date {
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-top: 2px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .expand-icon {
    color: var(--text-muted);
    font-size: 0.9rem;
    flex-shrink: 0;
    transition: transform 0.2s;
  }

  .event-card.open .expand-icon { transform: rotate(180deg); }

  /* DETAIL PANEL */
  .event-detail {
    display: none;
    padding: 0 14px 14px 54px;
    font-size: 0.88rem;
    color: var(--text-muted);
    line-height: 1.6;
    border-top: 1px solid var(--border);
    padding-top: 10px;
  }

  .event-card.open .event-detail { display: block; }

  .detail-section { margin-bottom: 8px; }

  .detail-label {
    font-family: 'Oswald', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 3px;
  }

  .detail-value {
    color: var(--text);
    font-size: 0.85rem;
  }

  /* PPV special glow */
  .event-card.type-ppv {
    box-shadow: inset 0 0 0 1px rgba(212,160,23,0.15);
  }

  .event-card.type-ppv .event-title {
    color: var(--ppv);
  }

  /* PROGRESS */
  .progress-bar-wrap {
    max-width: 900px;
    margin: 0 auto;
    padding: 6px 16px 16px;
  }

  .progress-label {
    font-family: 'Oswald', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 2px;
    color: var(--text-muted);
    margin-bottom: 5px;
  }

  .progress-bg {
    height: 5px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--raw), var(--gold));
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 3px;
  }

  /* SCROLL TOP */
  .scroll-top {
    position: fixed;
    bottom: 20px; right: 20px;
    width: 42px; height: 42px;
    background: var(--raw);
    color: #fff;
    border: none;
    border-radius: 2px;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 15px rgba(204,0,0,0.4);
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 50;
  }
  .scroll-top.visible { opacity: 1; }

  @media (max-width: 480px) {
    .logo-wwf { font-size: 2rem; }
    .event-title { font-size: 0.9rem; }
    .event-detail { padding-left: 14px; }
    .type-badge { display: none; }
    .filters { gap: 6px; }
    .filter-btn { padding: 5px 10px; font-size: 0.72rem; }
  }
</style>

let watched = JSON.parse(localStorage.getItem('wwf2001') || '{}');
let currentFilter = 'all';
let isNight = true;

function toggleNight() {
  isNight = !isNight;
  document.body.classList.toggle('light', !isNight);
  document.getElementById('nightBtn').textContent = isNight ? '☀ DÍA' : '🌙 NOCHE';
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.className = 'filter-btn';
  });
  btn.className = `filter-btn active-${f}`;
  renderList();
}

function toggleWatch(id) {
  watched[id] = !watched[id];
  if (!watched[id]) delete watched[id];
  localStorage.setItem('wwf2001', JSON.stringify(watched));
  renderList();
}

function toggleDetail(id) {
  const card = document.getElementById('card-' + id);
  card.classList.toggle('open');
}

function updateStats() {
  const totalWatched = Object.keys(watched).length;
  const total = EVENTS.length;
  const pct = total > 0 ? Math.round(totalWatched / total * 100) : 0;
  document.getElementById('progressLabel').textContent = `${totalWatched} / ${total} VISTOS — ${pct}%`;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('statRaw').textContent = `RAW: ${EVENTS.filter(e=>e.type==='raw' && watched[e.id]).length}/${EVENTS.filter(e=>e.type==='raw').length}`;
  document.getElementById('statSD').textContent = `SD!: ${EVENTS.filter(e=>e.type==='smackdown' && watched[e.id]).length}/${EVENTS.filter(e=>e.type==='smackdown').length}`;
  document.getElementById('statPPV').textContent = `PPV: ${EVENTS.filter(e=>e.type==='ppv' && watched[e.id]).length}/${EVENTS.filter(e=>e.type==='ppv').length}`;
  document.getElementById('statWatched').textContent = `✓ ${totalWatched}`;
}

// Save scroll position on scroll
let scrollSaveTimer;
window.addEventListener('scroll', () => {
  const btn = document.getElementById('scrollTop');
  btn.classList.toggle('visible', window.scrollY > 300);

  // Save scroll position debounced
  clearTimeout(scrollSaveTimer);
  scrollSaveTimer = setTimeout(() => {
    localStorage.setItem('wwf2001_scroll', window.scrollY);

    // Save visible month
    const monthGroups = document.querySelectorAll('.month-group');
    let currentMonth = '';
    monthGroups.forEach(group => {
      const rect = group.getBoundingClientRect();
      if (rect.top <= 120) {
        const label = group.querySelector('.month-label');
        if (label) currentMonth = label.childNodes[0].textContent.trim();
      }
    });
    if (currentMonth) localStorage.setItem('wwf2001_month', currentMonth);
  }, 300);
});

// Restore scroll position after render
function restoreScroll() {
  const savedMonth = localStorage.getItem('wwf2001_month');
  const savedScroll = parseInt(localStorage.getItem('wwf2001_scroll') || '0');

  if (savedMonth && currentFilter === 'all') {
    // Find the month group by label text and scroll to it
    const monthGroups = document.querySelectorAll('.month-group');
    for (const group of monthGroups) {
      const label = group.querySelector('.month-label');
      if (label && label.childNodes[0].textContent.trim() === savedMonth) {
        setTimeout(() => {
          const headerH = document.querySelector('.header').offsetHeight + 10;
          const top = group.getBoundingClientRect().top + window.scrollY - headerH;
          window.scrollTo({ top, behavior: 'instant' });
        }, 50);
        return;
      }
    }
  } else if (savedScroll > 0) {
    setTimeout(() => window.scrollTo({ top: savedScroll, behavior: 'instant' }), 50);
  }
}

// Show toast with current month on load
function showMonthToast(month) {
  if (!month) return;
  const toast = document.createElement('div');
  toast.style.cssText = `
    position:fixed; bottom:70px; left:50%; transform:translateX(-50%);
    background:#cc0000; color:white; padding:8px 20px;
    font-family:'Oswald',sans-serif; font-size:0.85rem; letter-spacing:2px;
    border-radius:2px; z-index:200; opacity:0;
    transition:opacity 0.3s; white-space:nowrap;
    box-shadow: 0 4px 15px rgba(204,0,0,0.4);
  `;
  toast.textContent = '📍 ' + month;
  document.body.appendChild(toast);
  setTimeout(() => toast.style.opacity = '1', 100);
  setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 400); }, 2500);
}

renderList();
const _savedMonth = localStorage.getItem('wwf2001_month');
restoreScroll();
if (_savedMonth) showMonthToast(_savedMonth);
